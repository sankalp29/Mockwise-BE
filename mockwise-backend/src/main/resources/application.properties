# Application name
spring.application.name=mockwise-backend

# Server port
server.port=8080

# --- Supabase PostgreSQL datasource ---
# Replace with your actual Supabase database URL and credentials
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?user=postgres.wpigzuuqotijpyeibzkc&password=Cricket@2961999
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate batching properties
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.datasource.hikari.pool-name=HikariPool
# keep small, PgBouncer already pools
spring.datasource.hikari.maximum-pool-size=5       
# don’t keep idle connections around
spring.datasource.hikari.minimum-idle=0
# 10s before closing idle
spring.datasource.hikari.idle-timeout=10000
# 1 min, PgBouncer prefers short
spring.datasource.hikari.max-lifetime=60000
# 30s wait before failing
spring.datasource.hikari.connection-timeout=30000
# logs leaks >20s
spring.datasource.hikari.leak-detection-threshold=20000

# ===============================
# Logging (important for debugging leaks)
# ===============================
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application URLs
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:5173

