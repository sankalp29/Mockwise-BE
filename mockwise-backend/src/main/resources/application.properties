# Application name
spring.application.name=mockwise-backend

# Server port
server.port=8080

# --- Supabase PostgreSQL datasource ---
# Replace with your actual Supabase database URL and credentials
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?user=postgres.wpigzuuqotijpyeibzkc&password=Cricket@2961999
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate batching properties
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- HikariCP Connection Pool ---
spring.datasource.hikari.pool-name=HikariCP
# Keep this small (Supabase free tier max is 20 connections)
spring.datasource.hikari.maximum-pool-size=10
# Only keep 1 idle connection
spring.datasource.hikari.minimum-idle=1
# 30s: close idle connections quickly
spring.datasource.hikari.idle-timeout=30000
# 30 min: recycle connections to avoid stale ones
spring.datasource.hikari.max-lifetime=1800000
# 20s: fail fast if no connection available
spring.datasource.hikari.connection-timeout=20000
# Default: safe for Hibernate
spring.datasource.hikari.auto-commit=true
# 5s for validation queries
spring.datasource.hikari.validation-timeout=5000
# Log if a connection is held >20s
spring.datasource.hikari.leak-detection-threshold=20000

# Application URLs
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:5173

